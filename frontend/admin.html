<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Management</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 100%;
            max-width: 600px;
            border: 5px solid #ffeb3b;
        }
        h1 { color: #ff5722; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        th { background-color: #f5f5f5; color: #2196f3; }
        .delete-btn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .delete-btn:hover { background-color: #d32f2f; }
        .refresh-btn {
            background-color: #2196f3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .status-msg { margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin: User Management 👤</h1>
        <button class="refresh-btn" onclick="fetchUsers()">Refresh User List</button>
        <div id="status" class="status-msg"></div>
        <table>
            <thead>
                <tr>
                    <th>Display Name</th>
                    <th>Username</th>
                    <th>Created At</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="user-list">
                <!-- Users will be injected here -->
            </tbody>
        </table>
        <p><a href="/">Back to Home</a></p>
    </div>

    <script>
        async function fetchUsers() {
            const tbody = document.getElementById('user-list');
            const status = document.getElementById('status');
            tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
            
            try {
                const response = await fetch('/api/GetRawProfiles');
                const users = await response.json();
                
                tbody.innerHTML = '';
                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4">No users found.</td></tr>';
                    return;
                }

                users.forEach(user => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${user.displayName || user.username}</td>
                        <td>${user.username}</td>
                        <td>${new Date(user.createdAt).toLocaleDateString()}</td>
                        <td><button class="delete-btn" onclick="deleteUser('${user.username}')">Delete</button></td>
                    `;
                    tbody.appendChild(tr);
                });
                status.textContent = "";
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="4">Error loading users.</td></tr>';
                console.error(error);
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Are you sure you want to delete user "${username}"?`)) return;

            const status = document.getElementById('status');
            status.textContent = "Deleting...";
            status.style.color = "orange";

            try {
                const response = await fetch('/api/DeleteUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });

                if (response.ok) {
                    status.textContent = "User deleted successfully! ✅";
                    status.style.color = "green";
                    fetchUsers();
                } else {
                    const msg = await response.text();
                    status.textContent = "Error: " + msg;
                    status.style.color = "red";
                }
            } catch (error) {
                status.textContent = "Connection error!";
                status.style.color = "red";
                console.error(error);
            }
        }

        // Initial fetch
        fetchUsers();
    </script>
</body>
</html>
