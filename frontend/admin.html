<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - User Management</title>
    <style>
        body { font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', cursive, sans-serif; background-color: #f0f8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; touch-action: manipulation; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 100%; max-width: 600px; border: 5px solid #ffeb3b; position: relative; }
        h1 { color: #ff5722; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #f5f5f5; color: #2196f3; }
        .delete-btn { background-color: #f44336; color: white; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .refresh-btn { background-color: #2196f3; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }
        .main-btn { background-color: #ff5722; color: white; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.2em; margin-top: 10px; }
        .status-msg { margin-top: 15px; font-weight: bold; min-height: 24px; }
        .wrong { color: #f44336; }
        .key-input { width: 80%; padding: 12px; font-size: 1.2em; border-radius: 10px; border: 3px solid #ffeb3b; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="admin-auth">
            <h1>Admin Lock 🔒</h1>
            <p>Enter the Admin Key to continue:</p>
            <input type="password" id="admin-key-input" class="key-input" placeholder="Enter Key">
            <button class="main-btn" onclick="tryLogin()">Access Admin</button>
            <div id="auth-status" class="status-msg"></div>
        </div>

        <div id="admin-content" style="display:none;">
            <h1>User Management 👤</h1>
            <button class="refresh-btn" onclick="fetchUsers()">Refresh List</button>
            <div id="main-status" class="status-msg"></div>
            <table>
                <thead>
                    <tr>
                        <th>Display Name</th>
                        <th>Username</th>
                        <th>Created At</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-list"></tbody>
            </table>
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>

    <script>
        let adminKey = "";

        function tryLogin() {
            const input = document.getElementById('admin-key-input');
            const status = document.getElementById('auth-status');
            if (input.value === "123321") {
                adminKey = input.value;
                document.getElementById('admin-auth').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                fetchUsers();
            } else {
                status.textContent = "Wrong key! ❌";
                status.className = "status-msg wrong";
                input.value = "";
            }
        }

        async function fetchUsers() {
            const tbody = document.getElementById('user-list');
            tbody.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
            try {
                const res = await fetch('/api/GetRawProfiles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminKey: adminKey })
                });
                if (!res.ok) throw new Error("Unauthorized");
                const users = await res.json();
                tbody.innerHTML = '';
                users.forEach(u => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${u.displayName || u.username}</td>
                        <td>${u.username}</td>
                        <td>${new Date(u.createdAt).toLocaleDateString()}</td>
                        <td><button class="delete-btn" onclick="deleteUser('${u.username}')">Delete</button></td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) { tbody.innerHTML = 'Error loading users'; }
        }

        async function deleteUser(username) {
            if (!confirm(`Delete user "${username}"?`)) return;
            try {
                const res = await fetch('/api/DeleteUser', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, adminKey: adminKey })
                });
                if (res.ok) fetchUsers();
            } catch (e) { alert("Error deleting user"); }
        }
    </script>
</body>
</html>
