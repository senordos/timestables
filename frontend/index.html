<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maths Fun! - Timestables</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div id="user-display" class="user-display"></div>
        <div id="global-reset-btn" class="reset-icon" style="display:none;">🚪</div>
        <h1>Maths Fun! 🧮</h1>

        <!-- Authentication Screen (Default) -->
        <div id="auth-screen">
            <h2>Who is playing? 🎮</h2>
            <p>Enter a fun name (not your real name):</p>
            <input type="text" id="username-input" placeholder="e.g. SuperRobot" class="name-input">
            <div id="auth-name-feedback" class="feedback-area"></div>
            <div class="auth-actions">
                <button id="login-mode-btn" class="main-btn">Login</button>
                <button id="register-mode-btn" class="secondary-btn">Register</button>
                <button id="guest-btn" class="secondary-btn">Play as Guest</button>
            </div>
        </div>

        <!-- Passcode Screen -->
        <div id="passcode-screen" style="display:none;">
            <h2 id="passcode-title">Create Passcode</h2>
            <div class="passcode-display">
                <input type="password" id="passcode-input" placeholder="****" readonly maxlength="6">
            </div>
            <div class="keypad">
                <div class="keypad-row">
                    <button class="pass-key-btn">1</button>
                    <button class="pass-key-btn">2</button>
                    <button class="pass-key-btn">3</button>
                </div>
                <div class="keypad-row">
                    <button class="pass-key-btn">4</button>
                    <button class="pass-key-btn">5</button>
                    <button class="pass-key-btn">6</button>
                </div>
                <div class="keypad-row">
                    <button class="pass-key-btn">7</button>
                    <button class="pass-key-btn">8</button>
                    <button class="pass-key-btn">9</button>
                </div>
                <div class="keypad-row">
                    <button class="pass-key-btn" id="clear-pass-btn">C</button>
                    <button class="pass-key-btn">0</button>
                    <button class="pass-key-btn" id="del-pass-btn">⌫</button>
                </div>
            </div>
            <button id="submit-auth-btn" class="main-btn">Go!</button>
            <button id="back-auth-btn" class="secondary-btn">Back</button>
            <div id="auth-feedback" class="feedback-area"></div>
        </div>

        <!-- Configuration Screen -->
        <div id="config-screen" style="display:none;">
            <p>Pick your timestables:</p>
            <div id="table-selection" class="button-grid">
                <button class="table-btn" data-value="2">2</button>
                <button class="table-btn" data-value="3">3</button>
                <button class="table-btn" data-value="4">4</button>
                <button class="table-btn" data-value="5">5</button>
                <button class="table-btn" data-value="6">6</button>
                <button class="table-btn" data-value="7">7</button>
                <button class="table-btn" data-value="8">8</button>
                <button class="table-btn" data-value="9">9</button>
                <button class="table-btn" data-value="10">10</button>
                <button class="table-btn" data-value="11">11</button>
                <button class="table-btn" data-value="12">12</button>
            </div>
            <button id="start-btn" class="main-btn" disabled>Start Quiz!</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" style="display:none;">
            <div class="quiz-info">
                <span>Question: <span id="question-num">1</span> / 10</span>
                <span>Score: <span id="score">0</span></span>
            </div>
            <div class="question-container">
                <span id="question">Loading...</span>
            </div>
            <div class="input-area">
                <input type="number" id="answer" placeholder="?" autocomplete="off" readonly>
                <button id="submit-btn" class="go-btn">Go!</button>
            </div>
            <div class="keypad">
                <div class="keypad-row">
                    <button class="key-btn">1</button>
                    <button class="key-btn">2</button>
                    <button class="key-btn">3</button>
                </div>
                <div class="keypad-row">
                    <button class="key-btn">4</button>
                    <button class="key-btn">5</button>
                    <button class="key-btn">6</button>
                </div>
                <div class="keypad-row">
                    <button class="key-btn">7</button>
                    <button class="key-btn">8</button>
                    <button class="key-btn">9</button>
                </div>
                <div class="keypad-row">
                    <button class="key-btn" id="clear-btn">C</button>
                    <button class="key-btn">0</button>
                    <button class="key-btn" id="del-btn">⌫</button>
                </div>
            </div>
            <div id="feedback" class="feedback-area"></div>
        </div>

        <!-- Results Screen -->
        <div id="results-screen" style="display:none;">
            <h2>Quiz Finished! 🏁</h2>
            <div class="final-score">
                You scored <span id="final-score">0</span> out of 10!
            </div>
            
            <div id="stats-summary" style="display:none;" class="stats-box">
                <p>Last 5 Games Avg: <span id="last-5-avg">0</span>%</p>
                <div class="table-stats-grid" id="table-stats-grid">
                    <!-- Table stats injected here -->
                </div>
            </div>

            <div class="result-actions">
                <button id="another-go-btn" class="main-btn">Another Go?</button>
                <button id="reset-btn" class="secondary-btn">Reset</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
